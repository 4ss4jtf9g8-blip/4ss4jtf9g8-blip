        }
        
        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .control-panel {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;

        .btn-danger:hover {
            background: #c82333;
        }

            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.warning {

            border: 1px solid #ffeeba;

        }

            padding: 10px 15px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 20px;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;

        .kb-btn:hover {
            background: #667eea;
            color: white;

            width: 20px;
            height: 20px;

# --- Обработчики команд ---

@dp.message(Command('start'))
async def cmd_start(message: types.Message, state: FSMContext):
    """Обработчик команды /start"""
    await state.set_state(BankStates.main_menu)
    await message.answer(
        '👋 Добро пожаловать!\n\n'
        'Выберите банк, чтобы получить информацию о продуктах,\n'
        'или обратитесь в поддержку:',
        reply_markup=get_main_keyboard()
    )
