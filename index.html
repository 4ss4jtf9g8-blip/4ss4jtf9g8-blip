<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velion Agency</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  scroll-behavior: smooth;
}

/* Анимации */
.fade-up {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s ease;
}
.fade-up.active {
  opacity: 1;
  transform: translateY(0);
}

header {
  background: #020617;
  padding: 20px;
  text-align: center;
}
nav a {
  margin: 0 15px;
  color: #38bdf8;
  text-decoration: none;
  transition: 0.3s;
}
nav a:hover {
  color: #fff;
}

section {
  padding: 60px 20px;
  max-width: 1000px;
  margin: auto;
}

.portfolio, .reviews {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: #38bdf8;
  color: #000;
  border-radius: 8px;
  text-decoration: none;
  transition: 0.3s;
}
.btn:hover {
  transform: scale(1.1);
}

footer {
  text-align: center;
  padding: 20px;
  background: #020617;
}
</style>
</head>

<body>

<header class="fade-up">
  <h1>Velion Agency</h1>
  <nav>
    <a href="#about">О нас</a>
    <a href="#portfolio">Портфолио</a>
    <a href="#reviews">Отзывы</a>
    <a href="#contact">Контакты</a>
  </nav>
</header>

<section id="about" class="fade-up">
  <h2>О нас</h2>
  <p>Velion — digital-агентство нового уровня.</p>
  <a href="#contact" class="btn">Связаться</a>
</section>

<section id="portfolio" class="fade-up">
  <h2>Портфолио</h2>
  <div class="portfolio">
    <div class="card">Проект 1</div>
    <div class="card">Проект 2</div>
    <div class="card">Проект 3</div>
  </div>
</section>

<section id="reviews" class="fade-up">
  <h2>Отзывы</h2>
  <div class="reviews">
    <div class="card">🔥 Круто сделали сайт</div>
    <div class="card">💯 Лучшее агентство</div>
    <div class="card">🚀 Будем работать ещё</div>
  </div>
</section>

<section id="contact" class="fade-up">
  <h2>Контакты</h2>
  <p>Email: velion@email.com</p>
</section>

<footer class="fade-up">
  © 2026 Velion
</footer>

<script>
// появление при скролле
const elements = document.querySelectorAll('.fade-up');

function showOnScroll() {
  const trigger = window.innerHeight * 0.85;

  elements.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < trigger) {
      el.classList.add('active');
    }
  });
}

window.addEventListener('scroll', showOnScroll);
showOnScroll();
</script>

</body>
</html>
