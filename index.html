<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Мой бот в Telegram</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .message {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
        }
        .user-message {
            background-color: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            align-self: flex-end;
        }
        .bot-message {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }
        button {
            background-color: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            margin: 4px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="keyboard"></div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем на весь экран

        // Простой симулятор бота
        const chat = document.getElementById('chat');
        const keyboard = document.getElementById('keyboard');

        function addMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msgDiv.textContent = text;
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        function showMainMenu() {
            keyboard.innerHTML = '';
            const banks = ['🏦 Альфа-Банк', '🏦 Озон Банк', '🏦 ВТБ', '🆘 Поддержка'];
            banks.forEach(bank => {
                const btn = document.createElement('button');
                btn.textContent = bank;
                btn.onclick = () => handleBankClick(bank);
                keyboard.appendChild(btn);
            });
        }

        function handleBankClick(bank) {
            addMessage(bank, true);
            
            if (bank === '🏦 Альфа-Банк') {
                addMessage('🏦 Альфа-Банк\n\nВыберите продукт:');
                showAlfaMenu();
            } else if (bank === '🆘 Поддержка') {
                addMessage('🆘 Служба поддержки\n\nСвяжитесь с нами: @support');
            }
        }

        function showAlfaMenu() {
            keyboard.innerHTML = '';
            const products = ['💰 Счет для инвестиций', '📊 Счет ИП', '💳 Кредитная карта', '🔙 Назад'];
            products.forEach(product => {
                const btn = document.createElement('button');
                btn.textContent = product;
                btn.onclick = () => {
                    addMessage(product, true);
                    if (product === '🔙 Назад') {
                        showMainMenu();
                    } else {
                        addMessage(`Открываю страницу: ${product}`);
                    }
                };
                keyboard.appendChild(btn);
            });
        }

        // Стартовое сообщение
        addMessage('👋 Добро пожаловать! Выберите банк:');
        showMainMenu();

        // Отправляем данные в Telegram о готовности
        tg.sendData(JSON.stringify({ action: 'start' }));
    </script>
</body>
</html>
