<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Банковский помощник</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #333333);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background-color: var(--tg-theme-header-bg-color, #ffffff);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            font-size: 20px;
            font-weight: 600;
            color: var(--tg-theme-text-color, #333333);
        }
        
        .chat-container {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 180px);
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background-color: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background-color: var(--tg-theme-secondary-bg-color, #e9e9eb);
            color: var(--tg-theme-text-color, #000000);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .keyboard-container {
            background-color: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid rgba(0,0,0,0.1);
            padding: 12px;
            position: sticky;
            bottom: 0;
        }
        
        .keyboard-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .keyboard-btn {
            flex: 1;
            min-width: 120px;
            padding: 14px 16px;
            background-color: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .keyboard-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        
        .keyboard-btn.secondary {
            background-color: var(--tg-theme-secondary-bg-color, #e9e9eb);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .status {
            text-align: center;
            padding: 12px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            background-color: var(--tg-theme-bg-color, #ffffff);
        }
        
        .welcome-message {
            text-align: center;
            margin: 20px 0;
            font-size: 16px;
            color: var(--tg-theme-hint-color, #666666);
        }
    </style>
</head>
<body>
    <div class="header">
        🏦 Банковский помощник
    </div>
    
    <div class="chat-container" id="chatMessages">
        <div class="bot-message">
            👋 Добро пожаловать! Я помогу вам выбрать банковские продукты.
        </div>
        <div class="bot-message">
            Выберите банк из меню ниже 👇
        </div>
    </div>
    
    <div class="keyboard-container" id="keyboardContainer">
        <div class="keyboard-row" id="keyboardRow">
            <!-- Кнопки будут добавляться сюда динамически -->
        </div>
    </div>
    
    <div class="status" id="status">
        🤖 Бот готов к работе
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Данные вашего бота
        const SUPPORT_USERNAME = 'rydr3';
        
        // Состояние бота
        let currentState = 'main_menu';
        
        // Функция добавления сообщения
        function addMessage(text, isUser = false) {
            const chat = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            // Форматируем текст
            let formattedText = text.replace(/\n/g, '<br>');
            
            // Подсвечиваем ссылки
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            formattedText = formattedText.replace(urlRegex, url => 
                `<a href="${url}" target="_blank" style="color: ${isUser ? '#fff' : '#40a7e3'};">${url}</a>`
            );
            
            messageDiv.innerHTML = formattedText;
            chat.appendChild(messageDiv);
            chat.scrollTop = chat.scrollHeight;
        }
        
        // Очистка клавиатуры
        function clearKeyboard() {
            document.getElementById('keyboardRow').innerHTML = '';
        }
        
        // Показать главное меню
        function showMainMenu() {
            clearKeyboard();
            currentState = 'main_menu';
            
            const row = document.getElementById('keyboardRow');
            
            const banks = [
                { text: '🏦 Альфа-Банк', action: 'alfa' },
                { text: '🏦 Озон Банк', action: 'ozon' },
                { text: '🏦 ВТБ', action: 'vtb' },
                { text: '🆘 Поддержка', action: 'support' }
            ];
            
            banks.forEach(bank => {
                const btn = document.createElement('button');
                btn.className = 'keyboard-btn';
                btn.textContent = bank.text;
                btn.onclick = () => handleButtonClick(bank.action);
                row.appendChild(btn);
            });
        }
        
        // Показать меню Альфа-Банка (ВАШИ ССЫЛКИ)
        function showAlfaMenu() {
            clearKeyboard();
            currentState = 'alfa_menu';
            
            const row = document.getElementById('keyboardRow');
            
            const products = [
                { text: '💰 Счет для инвестиций', link: 'https://alfa.me/5RI_Yr' },
                { text: '📊 Счет ИП', link: 'https://alfa.me/bv8nch' },
                { text: '💳 Кредитная карта', link: 'https://alfa.me/hTFvDV' },
                { text: '💳 Дебетовая карта', link: 'https://alfa.me/-EMo6O' },
                { text: '⭐ Alfa only', link: 'https://alfa.me/sZMzzo' },
                { text: '🏷️ Платежный стикер', link: 'https://alfa.me/8snsHH' },
                { text: '✈️ Alfa Travel', link: 'https://alfa.me/csys3Z' },
                { text: '🔙 Назад', action: 'back_to_main' }
            ];
            
            products.forEach(product => {
                const btn = document.createElement('button');
                btn.className = product.text.includes('Назад') ? 'keyboard-btn secondary' : 'keyboard-btn';
                btn.textContent = product.text;
                
                if (product.link) {
                    btn.onclick = () => {
                        addMessage(product.text, true);
                        addMessage(`🔗 Ссылка на продукт:\n${product.link}`);
                        tg.openLink(product.link);
                    };
                } else if (product.action) {
                    btn.onclick = () => handleButtonClick(product.action);
                }
                
                row.appendChild(btn);
            });
        }
        
        // Показать меню Озон Банк (ВАШИ ССЫЛКИ, БЕЗ ПОДПИСКИ)
        function showOzonMenu() {
            clearKeyboard();
            currentState = 'ozon_menu';
            
            const row = document.getElementById('keyboardRow');
            
            const products = [
                { text: '📊 Счет ИП', link: 'https://ozon.ru/fintech/apps/mgm/XSM2RX9-7' },
                { text: '💳 Кредитная карта', link: 'https://ozon.ru/fintech/promo/ref/DPTBQQV1Q' },
                { text: '💳 Дебетовая карта', link: 'https://ozon.ru/fintech/promo/ref/WXHTZO9RN' },
                { text: '🔙 Назад', action: 'back_to_main' }
            ];
            
            products.forEach(product => {
                const btn = document.createElement('button');
                btn.className = product.text.includes('Назад') ? 'keyboard-btn secondary' : 'keyboard-btn';
                btn.textContent = product.text;
                
                if (product.link) {
                    btn.onclick = () => {
                        addMessage(product.text, true);
                        addMessage(`🔗 Ссылка на продукт:\n${product.link}`);
                        tg.openLink(product.link);
                    };
                } else if (product.action) {
                    btn.onclick = () => handleButtonClick(product.action);
                }
                
                row.appendChild(btn);
            });
        }
        
        // Показать меню ВТБ
        function showVtbMenu() {
            clearKeyboard();
            currentState = 'vtb_menu';
            
            const row = document.getElementById('keyboardRow');
            
            const products = [
                { text: '💳 Кредитная карта', link: 'https://www.vtb.ru/personal/karty/kreditnye/' },
                { text: '💳 Дебетовая карта', link: 'https://www.vtb.ru/personal/karty/debetovye/' },
                { text: '🔙 Назад', action: 'back_to_main' }
            ];
            
            products.forEach(product => {
                const btn = document.createElement('button');
                btn.className = product.text.includes('Назад') ? 'keyboard-btn secondary' : 'keyboard-btn';
                btn.textContent = product.text;
                
                if (product.link) {
                    btn.onclick = () => {
                        addMessage(product.text, true);
                        addMessage(`🔗 Ссылка на продукт:\n${product.link}`);
                        tg.openLink(product.link);
                    };
                } else if (product.action) {
                    btn.onclick = () => handleButtonClick(product.action);
                }
                
                row.appendChild(btn);
            });
        }
        
        // Показать меню поддержки
        function showSupportMenu() {
            clearKeyboard();
            currentState = 'support';
            
            const row = document.getElementById('keyboardRow');
            
            const supportBtn = document.createElement('button');
            supportBtn.className = 'keyboard-btn';
            supportBtn.textContent = '💬 Написать в поддержку';
            supportBtn.onclick = () => {
                addMessage('💬 Написать в поддержку', true);
                addMessage(`👤 Свяжитесь с поддержкой: @${SUPPORT_USERNAME}`);
                tg.openTelegramLink(`https://t.me/${SUPPORT_USERNAME}`);
            };
            row.appendChild(supportBtn);
            
            const backBtn = document.createElement('button');
            backBtn.className = 'keyboard-btn secondary';
            backBtn.textContent = '🔙 Назад';
            backBtn.onclick = () => handleButtonClick('back_to_main');
            row.appendChild(backBtn);
        }
        
        // Обработка нажатий на кнопки
        function handleButtonClick(action) {
            switch(action) {
                case 'alfa':
                    addMessage('🏦 Альфа-Банк', true);
                    addMessage('🏦 Альфа-Банк\n\nВыберите продукт:');
                    showAlfaMenu();
                    break;
                    
                case 'ozon':
                    addMessage('🏦 Озон Банк', true);
                    addMessage('🏦 Озон Банк\n\nВыберите продукт:');
                    showOzonMenu();
                    break;
                    
                case 'vtb':
                    addMessage('🏦 ВТБ', true);
                    addMessage('🏦 ВТБ\n\nВыберите продукт:');
                    showVtbMenu();
                    break;
                    
                case 'support':
                    addMessage('🆘 Поддержка', true);
                    addMessage('🆘 Служба поддержки\n\nЗдесь вы можете связаться с нашим специалистом.');
                    showSupportMenu();
                    break;
                    
                case 'back_to_main':
                    addMessage('🔙 Назад в главное меню', true);
                    addMessage('Выберите банк или обратитесь в поддержку:');
                    showMainMenu();
                    break;
                    
                default:
                    console.log('Unknown action:', action);
            }
        }
        
        // Обработка команды /start
        function handleStart() {
            addMessage('/start', true);
            addMessage('👋 Добро пожаловать!\n\nВыберите банк, чтобы получить информацию о продуктах, или обратитесь в поддержку:');
            showMainMenu();
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            handleStart();
            
            tg.sendData(JSON.stringify({ 
                action: 'start',
                user_id: tg.initDataUnsafe?.user?.id || 'unknown'
            }));
            
            document.body.style.backgroundColor = tg.themeParams.bg_color || '#f5f5f5';
        });
        
        tg.onEvent('backButtonClicked', () => {
            if (currentState !== 'main_menu') {
                handleButtonClick('back_to_main');
            } else {
                tg.close();
            }
        });
        
        tg.onEvent('mainButtonClicked', () => {
            if (currentState !== 'main_menu') {
                tg.BackButton.show();
            } else {
                tg.BackButton.hide();
            }
        });
        
        console.log('Банковский помощник запущен!');
    </script>
</body>
</html>
